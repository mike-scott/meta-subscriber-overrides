# Example: this workflow lives in a layer repo (e.g. a meta-partner layer or your
# meta-subscriber-overrides) and triggers a fioman platform Run when that layer changes.
# fioman serve opens the Run and fans out one build per machine in streams.yaml; the runner
# agent pins `source` to this push's commit (kas refspec override) so the build picks up
# exactly this change. The rest of the layers stay at the kas file's pinned refs.
# Self-contained — curl only, no external action.
name: platform-build
on:
  push:
    branches: [main]
jobs:
  trigger:
    runs-on: ubuntu-24.04
    env:
      FIOMAN_SERVER: https://dev.scottml.com
      # Trigger token minted with `fioman trigger register <name> --streams main`, stored as
      # the FIOMAN_TRIGGER_TOKEN repo secret. fioman authenticates the trigger with it.
      FIOMAN_TOKEN: ${{ secrets.FIOMAN_TRIGGER_TOKEN }}
    steps:
      - name: Trigger + follow fioman Run
        run: |
          set -euo pipefail
          slug="${GITHUB_REPOSITORY##*/}@${GITHUB_SHA::7}"
          # `source` must match this layer's key in your kas file's `repos:` block
          # (e.g. examples/kas/factory.yml).
          resp=$(curl -fsS -X POST "$FIOMAN_SERVER/v1/runs" \
            -H "Authorization: Bearer $FIOMAN_TOKEN" \
            -H 'content-type: application/json' \
            -d "{\"stream\":\"main\",\"kind\":\"platform\",\"source\":\"meta-subscriber-overrides\",\"slug\":\"$slug\",\"commit_sha\":\"$GITHUB_SHA\"}")
          run_id=$(printf '%s' "$resp" | grep -o '"run_id":"[^"]*"' | head -1 | cut -d'"' -f4)
          [ -n "$run_id" ] || { echo "no run_id in response: $resp"; exit 1; }
          echo "queued Run $run_id — following to completion…"

          # Follow the Run: poll its status (readable with the trigger token) until terminal,
          # printing each transition; fail the job if the Run didn't pass.
          prev=""
          while :; do
            body=$(curl -fsS -H "Authorization: Bearer $FIOMAN_TOKEN" "$FIOMAN_SERVER/v1/runs/$run_id")
            status=$(printf '%s' "$body" | grep -o '"status":"[^"]*"' | head -1 | cut -d'"' -f4)
            [ "$status" != "$prev" ] && { echo "Run $run_id: $status"; prev="$status"; }
            case "$body" in *'"terminal":true'*) break ;; esac
            sleep 15
          done
          echo "Run $run_id finished: $status"
          [ "$status" = passed ] || exit 1
  # The heavy Yocto build runs on the provisioned/self-hosted runner via the fioman-runner
  # agent (kas-container), per machine, with a persistent sstate cache.
